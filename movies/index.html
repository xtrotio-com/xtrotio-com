<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTROTIO | Cinema Portal</title>
    <link rel="icon" type="image/png" href="/fevicon.png">
    <style>
        /* GLOBAL STYLES */
        body { 
            margin: 0; padding: 0; 
            background-color: #000; color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            overflow-x: hidden;
        }

        /* NAVIGATION BAR */
        nav {
            background: rgba(0, 0, 0, 0.95);
            padding: 18px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid #e50914;
            display: flex;
            justify-content: center;
            gap: 30px;
            backdrop-filter: blur(15px);
        }
        nav a {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        nav a:hover { color: #e50914; text-shadow: 0 0 10px #e50914; }

        /* HEADER */
        .category-header {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(180deg, #2b0000 0%, #000 100%);
        }
        .category-header h1 {
            font-size: clamp(30px, 8vw, 50px);
            color: #e50914;
            text-shadow: 0 0 20px #e50914;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* MOVIE GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            padding: 40px 20px;
            max-width: 1200px;
            margin: auto;
        }

        /* MOVIE CARD STYLING */
        .movie-card {
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #222;
            transition: 0.4s;
            display: flex;
            flex-direction: column;
        }
        .movie-card:hover { 
            transform: translateY(-10px);
            border-color: #e50914;
            box-shadow: 0 10px 30px rgba(229, 9, 20, 0.4);
        }

        /* FIXED BANNER BOX (2:3 Ratio) */
        .banner-container {
            width: 100%;
            padding-top: 150%; 
            position: relative;
            background: #222;
        }

        .banner {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .movie-info {
            padding: 20px;
            text-align: center;
        }

        .movie-title {
            font-size: 18px;
            font-weight: 900;
            margin-bottom: 15px;
            color: #fff;
            text-transform: uppercase;
        }

        /* BOT BUTTON */
        .tg-button {
            display: block;
            background: #e50914;
            color: #fff;
            text-decoration: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            transition: 0.3s;
            text-transform: uppercase;
        }
        .tg-button:hover { 
            background: #ff1e2b;
            box-shadow: 0 0 15px #e50914;
        }

        footer { text-align: center; padding: 40px; color: #444; font-size: 11px; }
    </style>
</head>
<body>

    <nav>
        <a href="https://www.xtrotio.com">HOME</a>
        <a href="/movies/">MOVIES</a>
        <a href="/editors/">EDITORS</a>
        <a href="/tools/">AI TOOLS</a>
    </nav>

    <div class="category-header">
        <h1>CINEMA PORTAL</h1>
        <p style="color: #888; letter-spacing: 2px;">SEARCH & DOWNLOAD VIA TELEGRAM BOT</p>
    </div>

    <div class="grid">
        <div class="movie-card">
            <div class="banner-container">
                <img src="https://image.tmdb.org/t/p/w500/74xTEgt7R36FpZuB7buR3pC7N7t.jpg" class="banner" alt="The Batman">
            </div>
            <div class="movie-info">
                <div class="movie-title">The Batman</div>
                <a href="https://t.me/ProSearchM7Bot" class="tg-button">SEARCH IN BOT</a>
            </div>
        </div>

        <div class="movie-card">
            <div class="banner-container">
                <img src="https://image.tmdb.org/t/p/w500/gEU2QniE6E77NI6v36G1pC6pQY9.jpg" class="banner" alt="Interstellar">
            </div>
            <div class="movie-info">
                <div class="movie-title">Interstellar</div>
                <a href="https://t.me/ProSearchM7Bot" class="tg-button">SEARCH IN BOT</a>
            </div>
        </div>

        <div class="movie-card">
            <div class="banner-container">
                <img src="https://image.tmdb.org/t/p/w500/t6SlsnzhnR36C3s89sZtVJsFq0m.jpg" class="banner" alt="Avatar">
            </div>
            <div class="movie-info">
                <div class="movie-title">Avatar: Way of Water</div>
                <a href="https://t.me/ProSearchM7Bot" class="tg-button">SEARCH IN BOT</a>
            </div>
        </div>

        <div class="movie-card">
            <div class="banner-container">
                <img src="https://image.tmdb.org/t/p/w500/8GxvA9zDZUGwhQpS3y8P1YMc979.jpg" class="banner" alt="Oppenheimer">
            </div>
            <div class="movie-info">
                <div class="movie-title">Oppenheimer</div>
                <a href="https://t.me/ProSearchM7Bot" class="tg-button">SEARCH IN BOT</a>
            </div>
        </div>
    </div>

    <footer>
        XTROTIO MOVIE NETWORK • POWERED BY PROSEARCH BOT
    </footer>

</body>
</html>
