<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTROTIO | Pro Editors</title>
    <style>
        body { margin: 0; padding: 0; background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; }
        
        /* Nav Bar matches main page */
        nav {
            background: rgba(0, 0, 0, 0.9);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #00d4ff;
            display: flex;
            justify-content: center;
            gap: 25px;
        }
        nav a { color: #fff; text-decoration: none; font-weight: bold; font-size: 13px; letter-spacing: 2px; }

        .category-header {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(180deg, #001a1a 0%, #000 100%);
        }
        .category-header h1 {
            font-size: 50px;
            color: #00d4ff;
            text-shadow: 0 0 20px #00d4ff;
            margin: 0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 40px;
            max-width: 1100px;
            margin: auto;
        }

        .card {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        .card:hover { border-color: #00d4ff; transform: translateY(-10px); box-shadow: 0 10px 30px rgba(0, 212, 255, 0.2); }

        .app-icon { width: 80px; height: 80px; border-radius: 18px; margin-bottom: 15px; }
        
        .badge {
            background: #00d4ff;
            color: #000;
            font-size: 10px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 5px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .dl-button {
            display: block;
            margin-top: 20px;
            padding: 12px;
            border: 2px solid #00d4ff;
            color: #00d4ff;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }
        .dl-button:hover { background: #00d4ff; color: #000; }
    </style>
</head>
<body>

    <nav>
        <a href="/">HOME</a>

            <p style="font-size: 13px; color: #888;">All effects and transitions unlocked.</p>
            <a href="YOUR_LINK_HERE" class="dl-button">DOWNLOAD</a>
        </div>

        <div class="card">
            <div class="badge">PREMIUM</div>
            <img src="https://play-lh.googleusercontent.com/9AsV5jG-npsP_Z25Sj0S5u9kYv8Q_D2_7k8C-vH-X1XoG-N6N-K9V_Vj0X0" class="app-icon" style="background:#000;">
            <h3>Alight Motion</h3>
            <p style="font-size: 13px; color: #888;">No watermark XML support.</p>
            <a href="YOUR_LINK_HERE" class="dl-button">DOWNLOAD</a>
        </div>

        <div class="card">
            <div class="badge">GOLD MOD</div>
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/KineMaster_logo.png/600px-KineMaster_logo.png" class="app-icon">
            <h3>KineMaster</h3>
            <p style="font-size: 13px; color: #888;">Full asset store access.</p>
            <a href="YOUR_LINK_HERE" class="dl-button">DOWNLOAD</a>
        </div>
    </div>

</body>
</html>
