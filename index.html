<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XTROTIO | Official</title>
    <link rel="icon" type="image/png" href="fevicon.png">
    <style>
        /* 1. RESET & BASE */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; padding: 0; 
            background-color: #000; color: #fff; 
            font-family: -apple-system, system-ui, sans-serif;
            overflow-x: hidden;
        }

        /* 2. RESPONSIVE HERO SECTION */
        .hero {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #1a0000 0%, #000 80%);
            text-align: center;
            padding-bottom: 80px; /* Space for mobile tab bar */
        }

        .logo {
            font-size: clamp(60px, 15vw, 100px);
            font-weight: 900;
            letter-spacing: -4px;
            margin: 0;
            text-transform: lowercase;
        }
        .logo span { color: #e50914; }

        .tagline {
            color: #666;
            font-size: 10px;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: 15px;
        }

        /* 3. SMART NAVIGATION (Tab Bar on Mobile / Header on Desktop) */
        nav {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid #222;
            display: flex; justify-content: space-around;
            padding: 15px 5px;
            z-index: 1000;
        }

        nav a {
            color: #888;
            text-decoration: none;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        nav a.active { color: #e50914; }
        .vip { color: #d4af37 !important; }

        /* 4. DESKTOP ADAPTATION */
        @media (min-width: 768px) {
            nav {
                top: 0; bottom: auto;
                background: rgba(0,0,0,0.8);
                border-top: none;
                border-bottom: 1px solid #111;
                padding: 25px 0;
            }
            nav a { font-size: 12px; letter-spacing: 2px; }
            .hero { padding-bottom: 0; }
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1 class="logo">xtrotio<span>.</span></h1>
        <p class="tagline">The Content Network</p>
    </div>

    <nav>
        <a href="/" class="active">HOME</a>
        <a href="/movies/">MOVIES</a>
        <a href="/live/">LIVE</a>
        <a href="/editors/">EDITORS</a>
        <a href="/18plus/" class="vip">VIP 18+</a>
    </nav>

</body>
</html>
