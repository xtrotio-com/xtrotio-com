<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTROTIO | Official Home</title>
    <link rel="icon" type="image/png" href="fevicon.png">
    <style>
        /* GLOBAL STYLES */
        body {
            margin: 0; padding: 0;
            background-color: #000; color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; flex-direction: column; min-height: 100vh;
            overflow-x: hidden;
        }

        /* PREMIUM NAVIGATION MENU */
        nav {
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px 0;
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; justify-content: center; align-items: center;
            gap: clamp(10px, 3vw, 30px); /* Responsive gap */
        }

        nav a {
            color: #aaa;
            text-decoration: none;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: 0.3s;
            position: relative;
        }

        /* HOVER & ACTIVE EFFECTS */
        nav a:hover { color: #fff; }
        nav a.active { color: #e50914; }
        
        /* VIP GOLD LINK STYLING */
        .vip-link { 
            color: #d4af37 !important; 
            border: 1px solid #d4af37;
            padding: 5px 12px;
            border-radius: 4px;
            transition: 0.4s;
        }
        .vip-link:hover { 
            background: #d4af37; 
            color: #000 !important;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        /* HERO SECTION */
        .hero {
            flex: 1;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #1a0000 0%, #000 70%);
            padding: 40px;
        }

        .logo-main {
            font-size: clamp(50px, 12vw, 90px);
            font-weight: 900;
            color: #fff;
            letter-spacing: -3px;
            margin: 0;
            text-transform: lowercase;
            animation: glow 3s ease-in-out infinite alternate;
        }

        .logo-main span { color: #e50914; }

        @keyframes glow {
            from { text-shadow: 0 0 10px rgba(255,255,255,0.1); }
            to { text-shadow: 0 0 30px rgba(229, 9, 20, 0.3); }
        }

        .tagline {
            color: #888;
            font-size: 12px;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-top: 20px;
            opacity: 0.8;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 30px;
            color: #222;
            font-size: 10px;
            letter-spacing: 2px;
            border-top: 1px solid #111;
        }
    </style>
</head>
<body>

    <nav>
        <a href="/" class="active">HOME</a>
        <a href="/movies/">MOVIES</a>
        <a href="/live/">LIVE CHAT</a>
        <a href="/editors/">EDITORS</a>
        <a href="/tools/">AI TOOLS</a>
        <a href="/18plus/" class="vip-link">VIP 18+</a>
    </nav>

    <div class="hero">
        <h1 class="logo-main">xtrotio<span>.</span></h1>
        <p class="tagline">Global Content Network</p>
    </div>

    <footer>
        © 2026 XTROTIO GLOBAL NETWORK • KOZHIKODE
    </footer>

</body>
</html>
