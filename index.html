<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XTROTIO | Premium Mods</title>
    <style>
        /* GLOBAL STYLES */
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #000; 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            overflow-x: hidden;
        }

        /* HEADER SECTION */
        .header-container {
            width: 100%;
            padding: 60px 0;
            background: linear-gradient(180deg, rgba(26, 0, 26, 0.9) 0%, rgba(0, 0, 0, 1) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            border-bottom: 2px solid #ff007f;
            box-shadow: 0 10px 30px rgba(255, 0, 127, 0.3);
        }
        .logo-text {
            font-size: clamp(40px, 10vw, 70px);
            font-weight: 900;
            letter-spacing: 8px;
            margin: 0;
            text-shadow: 0 0 7px #fff, 0 0 42px #ff007f;
            animation: flicker 2s infinite alternate;
        }
        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { text-shadow: 0 0 7px #fff, 0 0 42px #ff007f; }
            20%, 24%, 55% { text-shadow: none; color: #333; }
        }

        /* MOD SECTION LAYOUT */
        .content-wrapper {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            padding: 60px 20px;
        }

        /* UNIVERSAL MOD BOX STYLING */
        .mod-box {
            background: #000;
            padding: 40px 30px;
            border-radius: 15px;
            text-align: center;
            position: relative;
            overflow: hidden;
            width: 100%;
            max-width: 400px;
            transition: transform 0.3s;
        }
        .mod-box:hover { transform: translateY(-10px); }

        /* NETFLIX GREEN THEME */
        .netflix-theme { 
            border: 2px solid #00ff41; 
            box-shadow: 0 0 20px #00ff41, inset 0 0 10px #00ff4133; 
        }
        
        /* PICSART PURPLE THEME */
        .picsart-theme { 
            border: 2px solid #8b3dff; 
            box-shadow: 0 0 20px #8b3dff, inset 0 0 10px #8b3dff33; 
        }

        .app-logo {
            width: 90px; height: 90px;
            margin-bottom: 20px;
            border-radius: 20%;
            object-fit: contain;
        }
        .netflix-theme .app-logo { filter: drop-shadow(0 0 10px #00ff41); }
        .picsart-theme .app-logo { filter: drop-shadow(0 0 10px #8b3dff); }

        .status-badge {
            display: inline-block;
            font-size: 11px;
            padding: 5px 15px;
            border-radius: 4px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #000;
            text-transform: uppercase;
        }
        .netflix-theme .status-badge { background: #00ff41; }
        .picsart-theme .status-badge { background: #8b3dff; color: #fff; }

        .description {
            font-size: 14px;
            margin-bottom: 30px;
            font-weight: 600;
        }
        .netflix-theme .description { color: #00ff41; }
        .picsart-theme .description { color: #8b3dff; }

        .download-btn {
            display: inline-block;
            padding: 18px 45px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 900;
            font-size: 18px;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .netflix-theme .download-btn { border: 2px solid #00ff41; color: #00ff41; box-shadow: 0 0 15px #00ff41; }
        .netflix-theme .download-btn:hover { background: #00ff41; color: #000; }
        
        .picsart-theme .download-btn { border: 2px solid #8b3dff; color: #8b3dff; box-shadow: 0 0 15px #8b3dff; }
        .picsart-theme .download-btn:hover { background: #8b3dff; color: #fff; }

        /* SCANNER ANIMATION */
        .scanner {
            width: 100%; height: 3px;
            position: absolute; left: 0;
            animation: scan 3s linear infinite;
            opacity: 0.6;
        }
        .netflix-theme .scanner { background: #00ff41; }
        .picsart-theme .scanner { background: #8b3dff; }
        @keyframes scan { 0% { top: -5%; } 100% { top: 105%; } }

        .footer-info {
            text-align: center;
            color: #444;
            font-size: 12px;
            margin-top: 50px;
            padding-bottom: 20px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <header class="header-container">
        <h1 class="logo-text">XTROTIO</h1>
        <p style="color: #00ff41; letter-spacing: 5px; font-weight: bold;">MODS • AI • FUTURE</p>
    </header>

    <div class="content-wrapper">
        <div class="mod-box netflix-theme">
            <div class="scanner"></div>
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/ff/Netflix-new-icon.png" alt="Netflix" class="app-logo">
            <h3>Netflix Premium</h3>
            <div class="status-badge">LATEST VERSION</div>
            <p class="description">4K UHD | NO ADS | UNLOCKED</p>
            <a href="https://shrinkme.click/NetflixPremiumMod" class="download-btn" target="_blank">DOWNLOAD</a>
        </div>

        <div class="mod-box picsart-theme">
            <div class="scanner"></div>
            <img src="https://picsart.com/apple-touch-icon.png" alt="Picsart" class="app-logo">
            <h3>Picsart Gold</h3>
            <div class="status-badge">LATEST VERSION</div>
            <p class="description">AI TOOLS | PREMIUM UNLOCKED</p>
            <a href="https://shrinkme.click/PicsartPremiumMod" class="download-btn" target="_blank">DOWNLOAD</a>
        </div>
    </div>

    <div class="footer-info">
        SECURE LINK GENERATION • XTROTIO SYSTEM V1.0
    </div>

</body>
</html>
